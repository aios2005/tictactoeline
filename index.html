<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha Multiplayer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1> Jogo da Velha online - Anti block escolar </h1>
        
        <div id="lobby">
            <button id="btn-criar-sala">Criar Nova Sala</button>
            <p>ou</p>
            <input type="text" id="input-sala" placeholder="Código da Sala (Ex: 1234)">
            <button id="btn-entrar-sala">Entrar na Sala</button>
        </div>

        <div id="game-screen" style="display: none;">
            <div id="status">Aguardando outro jogador...</div>
            <div id="codigo-sala-display">Sala: <span id="sala-id">----</span> | Você é o jogador: <span id="seu-simbolo">?</span></div>
            
            <div class="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

            <button id="reset-btn">Reiniciar Jogo</button>
        </div>

        <br/>
        <img src="https://as2.ftcdn.net/jpg/04/39/93/99/1000_F_439939972_GxycVL7LuSTEW1jFSOV2GDwq2OqDksGq.jpg" height="90px" width="100px">

        <p style="color: gray; margin-top: 10%;">Desenvolvido por: Antonio Ivo (2026)</p>
        <p style="color: gray;"><a href="https://github.com/aios2005">https://github.com/aios2005</a></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
